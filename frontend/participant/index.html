<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Buzzer – Participant</title>
  <meta name="description" content="Register and buzz in real-time quiz events." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="participant.css" />
</head>
<body>

  <!-- Connection Badge -->
  <div id="connection-badge" class="connection-badge disconnected">
    <span class="dot"></span>
    <span id="connection-text">Connecting</span>
  </div>

  <!-- REGISTRATION SCREEN -->
  <div id="register-screen" class="screen active">
    <div class="register-wrap">
      <div class="brand-mark">QUIZ BUZZER</div>
      <h1>Join the Event</h1>
      <p class="lead">Enter your name to participate</p>

      <form id="register-form">
        <div class="fields">
          <div class="field">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" placeholder="e.g. Rahul" autocomplete="given-name" required />
          </div>
          <div class="field">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" placeholder="e.g. Sharma" autocomplete="family-name" required />
          </div>
        </div>
        <button type="submit" id="register-btn" class="btn-primary">
          <span>Enter Event</span>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
        <div id="register-error" class="field-error hidden"></div>
      </form>
    </div>
  </div>

  <!-- BUZZER SCREEN -->
  <div id="buzzer-screen" class="screen hidden">

    <!-- Top Status Bar -->
    <header class="participant-header">
      <div class="hstat">
        <span class="hstat-label">Participant</span>
        <span class="hstat-value" id="display-name">—</span>
      </div>
      <div class="hsep"></div>
      <div class="hstat">
        <span class="hstat-label">Round</span>
        <span class="hstat-value" id="round-display">—</span>
      </div>
      <div class="hsep"></div>
      <div class="hstat">
        <span class="hstat-label">Status</span>
        <span class="badge waiting" id="round-status-badge">WAITING</span>
      </div>
    </header>

    <!-- Main Buzz Area -->
    <main class="buzz-main">
      <div class="buzz-outer">
        <div class="buzz-ring" id="buzz-ring"></div>
        <button id="buzz-btn" class="buzz-btn" disabled>
          <span class="buzz-label">BUZZ</span>
        </button>
      </div>

      <div id="position-card" class="pos-card hidden">
        <div class="pos-num" id="position-number">#1</div>
        <div class="pos-label" id="position-text">in queue</div>
      </div>

      <div id="notification-bar" class="notif hidden"></div>
    </main>

  </div>

  <!-- COUNTDOWN OVERLAY -->
  <div id="countdown-overlay" class="countdown-overlay hidden">
    <div class="countdown-circle">
      <div id="countdown-number" class="countdown-number">3</div>
    </div>
    <div class="countdown-label" id="countdown-label">GET READY</div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="participant.js"></script>
</body>
</html>
