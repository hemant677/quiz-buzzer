<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Buzzer – Live Display</title>
  <meta name="description" content="Live public leaderboard for the quiz buzzer event." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Barlow+Condensed:ital,wght@0,600;0,700;0,900;1,700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="display.css" />
</head>
<body>

  <!-- ── BROADCAST HEADER ──────────────────── -->
  <header class="broadcast-header">
    <div class="bh-left">
      <div class="bh-logo">◈</div>
      <div class="bh-title">QUIZ BUZZER</div>
      <div class="live-badge">
        <span class="live-dot"></span>
        LIVE
      </div>
    </div>
    <div class="bh-center" id="round-pill">WAITING FOR ROUND</div>
    <div class="bh-right">
      <div id="round-status-badge" class="status-tag waiting">WAITING</div>
    </div>
  </header>

  <!-- ── MAIN BROADCAST AREA ───────────────── -->
  <main class="broadcast-main">

    <!-- Left: Now Answering -->
    <section class="answering-section">
      <div class="answering-label">NOW ANSWERING</div>
      <div class="answering-name" id="current-participant">—</div>
      <div class="answering-sub" id="current-subtitle">Waiting for round to begin</div>
      <div class="answering-bar"></div>
    </section>

    <!-- Divider -->
    <div class="broadcast-divider"></div>

    <!-- Right: Standings -->
    <section class="standings-section">
      <div class="standings-header">
        <div class="standings-title">STANDINGS</div>
        <div id="scores-hidden-notice" class="hidden-tag hidden">SCORES HIDDEN</div>
      </div>
      <div id="leaderboard-body" class="standings-body">
        <div class="waiting-msg">Waiting for participants…</div>
      </div>
    </section>

  </main>

  <!-- ── TICKER ────────────────────────────── -->
  <footer class="broadcast-ticker">
    <div class="ticker-live">
      <span class="ticker-dot"></span>
      LIVE
    </div>
    <div id="ticker-content" class="ticker-text">Welcome to Quiz Buzzer — Connecting to server…</div>
  </footer>

  <script src="/socket.io/socket.io.js"></script>
  <script src="display.js"></script>
</body>
</html>
